name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      # NOTE: this requires the wechat-ilink-sdk dependency in pom.xml to be
      # resolvable from a public repository. As of now pom.xml references a
      # -SNAPSHOT that is NOT on Maven Central — pin a released version (e.g.
      # 2.3.3) or publish the SDK before this job can pass.
      - name: Build and test
        run: mvn -B clean package

      # Live integration tests (DashScope / Anthropic / real MCP) are guarded by
      # @EnabledIfEnvironmentVariable and skipped here by design.
      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: ignore
