name: CI

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # SDK 3.0.0 待发布 Maven Central（见 wechat-ilink-sdk-java/docs/adr/0002），
      # 当前依赖本地 .m2 install；发布前 CI 需补预装步骤或私服。
      # Live 集成测试（DashScope / Anthropic / 真实 MCP）由 @EnabledIfEnvironmentVariable 守卫，CI 默认跳过。
      - name: Build and test (mvn verify)
        run: mvn -B clean verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: ignore
